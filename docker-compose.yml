# ======================================================
#  WSTunnel 整合部署設定 (含可選的 DNSTT DNS 隧道服務)
#
#  基本啟動 (僅 wstunnel):
#    docker compose up -d
#
#  含 DNS 隧道啟動:
#    docker compose --profile dnstt up -d
#
#  DNS 記錄設定 (在域名註冊商後台新增):
#    A/AAAA  tns.example.com  →  您的伺服器 IP
#    NS      t.example.com    →  tns.example.com
#
#  啟動後憑證與種子會自動生成於 ./data/dnstt/
#
#  客戶端連線範例 (使用 slipstream-client):
#    ./slipstream-client --tcp-listen-port 7000 --domain t.example.com
#    curl -x socks5h://127.0.0.1:7000 http://ifconfig.me
# ======================================================

services:
  wstunnel:
    image: ghcr.io/treehd/wstunnel:latest
    container_name: wstunnel
    restart: always
    ports:
      - "80:80"       # HTTP Upgrade 入口 (Payload 模式)
      - "443:443"     # TLS Multiplexer (加密入口)
      - "9090:9090"   # 管理後台
      # 注意:UDPGW (7300) 故意不對外公開,只在容器內部由 SSH Tunnel 存取。
      # 對外公開會讓任何人都能把伺服器當匿名 UDP 出口代理,被濫用做 UDP-based
      # 攻擊中繼或反射放大,並汙染伺服器 IP reputation。
    # -------------------------------------------------------
    # DNS 設定：讓容器本身的 OS 層 DNS 使用指定伺服器
    # 若不指定，容器會繼承宿主機的 /etc/resolv.conf
    # -------------------------------------------------------
    dns:
      - 8.8.8.8        # Google DNS (主要)
      - 8.8.4.4        # Google DNS (備用)
      # - 1.1.1.1      # Cloudflare (可替換)
    environment:
      # -------------------------------------------------------
      # DNS_SERVER: 讓 wstunnel 出站解析時使用指定的 DNS 伺服器
      # 格式: "ip" 或 "ip:port"，支援逗號分隔多筆 (failover)
      # 範例: "8.8.8.8, 1.1.1.1:53"
      # 留空則使用上方 dns: 的設定
      # -------------------------------------------------------
      - DNS_SERVER=8.8.8.8, 1.1.1.1:53
    volumes:
      # 持久化資料夾: 所有帳號設定、流量紀錄都會儲存在此。
      # 第一次啟動時會自動產生預設的 config.json，請由此修改您的初始密碼與帳號設定。
      - ./data:/app/data
    healthcheck:
      # 確認 HTTP Upgrade 入口 (port 80) 已就緒，DNSTT 需等此狀態才啟動
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/80 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  # ======================================================
  #  DNSTT DNS 隧道服務 (Slipstream + SOCKS 模式)
  #  使用方式: docker compose --profile dnstt up -d
  #
  #  ⚠️  安全須知 (請務必閱讀)
  #  --------------------------------------------------
  #  本服務必須對外公開 UDP/53 才能運作,有以下風險:
  #
  #  1. DNS 反射放大 (Amplification):
  #     攻擊者可偽造受害者 IP 對你的 53 發查詢,讓 Slipstream
  #     的回應(即使是 REFUSED)打到受害者。Slipstream 設計上只
  #     回應隧道協定的查詢,放大倍率有限,但仍會消耗你的頻寬
  #     並汙染你的 IP reputation。
  #
  #  2. Open Resolver 濫用:
  #     若 Slipstream 對非協定查詢回應大封包,會被列入
  #     openresolverproject.org 黑名單。
  #
  #  建議緩解 (在宿主機執行,Docker 預設 forwarding 仍會經過):
  #    # 限制單一來源 IP 每秒最多 10 個 UDP/53 查詢
  #    iptables -I DOCKER-USER -p udp --dport 53 \
  #      -m hashlimit --hashlimit-name dns53 --hashlimit-above 10/sec \
  #      --hashlimit-mode srcip --hashlimit-burst 30 -j DROP
  #
  #    # 或丟棄超過 512 byte 的查詢(正常 DNS 查詢都遠小於此)
  #    iptables -I DOCKER-USER -p udp --dport 53 \
  #      -m length --length 512:65535 -j DROP
  #
  #  並監控:
  #    - 出站 UDP/53 流量是否異常(正常隧道流量應遠小於放大攻擊)
  #    - 你的 IP 是否上 abuseipdb / spamhaus
  # ======================================================
  dnstt:
    profiles:
      - dnstt
    image: ghcr.io/treehd/wstunnel-dnstt:latest
    container_name: dnstt
    restart: always
    # NET_ADMIN 用於在容器內加 iptables 規則,鎖死 UDP/53 只回應
    # 查詢 DNSTT_DOMAIN 或其 subdomain 的封包,消除反射放大攻擊面
    cap_add:
      - NET_ADMIN
    ports:
      - "53:5353/udp"   # 對外監聽 UDP 53,容器內使用 5353 避免需要 NET_ADMIN 設定
    environment:
      # [必填] DNS 隧道域名,須與 DNS NS 記錄一致
      # 範例: t.example.com  請將此行替換為您的實際域名
      - DNSTT_DOMAIN=
